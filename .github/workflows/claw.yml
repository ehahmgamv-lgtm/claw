name: claw
on: workflow_dispatch
jobs:
  claw:
    runs-on: ubuntu-24.04-arm
    steps:
      - env:
          # ЗДЕСЬ ТЕПЕРЬ ДОЛЖНЫ БЫТЬ КЛЮЧИ OPENROUTER! НЕ ПЕРЕПУТАЙ!
          API_KEYS: ${{ secrets.API_KEYS }} 
        run: |
          curl -fsSL https://openclaw.ai/install-cli.sh | bash
          mkdir -p ~/.openclaw
          
          # Парсим ключи
          CHOSEN_KEY=$(echo "$API_KEYS" | tr ',' '\n' | sed 's/^[ \t]*//;s/[ \t]*$//' | grep -v '^$' | shuf -n 1)

          # Да, я вижу твой пробел. Угомонись.
          if [ -z "$CHOSEN_KEY" ]; then
            echo "Ошибка: Пул ключей пуст или распарсился криво. Проверь secrets.API_KEYS!"
            exit 1
          fi
          
          echo "Сгенерирован конфиг со случайным ключом."
          
          # ЗАМЕНЯЕМ ПРОВАЙДЕРА НА OPENROUTER, СМОТРИ В ОБА:
          jq -n --arg key "$CHOSEN_KEY" '{
            "gateway": { "mode": "local" },
            "models": {
              "providers": {
                "openrouter": {
                  "baseUrl": "https://openrouter.ai/api/v1",
                  "models":[{ "id": "gpt-oss-120b", "name": "gpt-oss-120b" }],
                  "apiKey": $key
                }
              }
            },
            "agents": {
              "defaults": {
                "model": {
                  "primary": "openrouter/gpt-oss-120b"
                }
              }
            },
            "channels": {
              "telegram": {
                "botToken": "8746891105:AAEXzLKMlPNVHMN6kLpO11fDJlRFlFeI_2s",
                "dmPolicy": "allowlist",
                "allowFrom":[6278506570]
              }
            }
          }' > ~/.openclaw/openclaw.json
          
          ~/.openclaw/bin/openclaw gateway
