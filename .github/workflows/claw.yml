name: claw
on: workflow_dispatch
jobs:
  claw:
    runs-on: ubuntu-24.04-arm
    steps:
      - env:
          API_KEYS: ${{ secrets.API_KEYS }}
        run: |
          curl -fsSL https://openclaw.ai/install-cli.sh | bash
          mkdir -p ~/.openclaw
          
          # Жестко и надежно выбираем ОДИН случайный ключ из строки
          # 1. Заменяем запятые на переносы строк (tr)
          # 2. Чистим от случайных пробелов (sed)
          # 3. Убираем пустые строки на всякий случай (grep)
          # 4. Выбираем ровно один случайный (shuf)
          CHOSEN_KEY=$(echo "$API_KEYS" | tr ',' '\n' | sed 's/^[ \t]*//;s/[ \t]*$//' | grep -v '^$' | shuf -n 1)

          if[ -z "$CHOSEN_KEY" ]; then
            echo "Ошибка: Пул ключей пуст или распарсился криво. Проверь secrets.API_KEYS!"
            exit 1
          fi
          
          echo "Сгенерирован конфиг со случайным ключом."
          
          # Передаем ТОЛЬКО ВЫБРАННЫЙ КЛЮЧ ($CHOSEN_KEY) в jq под именем переменной 'key'
          jq -n --arg key "$CHOSEN_KEY" '{
            "gateway": { "mode": "local" },
            "models": {
              "providers": {
                "google": {
                  "baseUrl": "https://generativelanguage.googleapis.com/v1beta",
                  "models":[{ "id": "gemini-3-flash", "name": "gemini-3-flash" }],
                  "apiKey": $key
                }
              }
            },
            "agents": {
              "defaults": {
                "model": {
                  "primary": "google/gemini-3-flash"
                }
              }
            },
            "channels": {
              "telegram": {
                "botToken": "8746891105:AAEXzLKMlPNVHMN6kLpO11fDJlRFlFeI_2s",
                "dmPolicy": "allowlist",
                "allowFrom": [6278506570]
              }
            }
          }' > ~/.openclaw/openclaw.json
          
          ~/.openclaw/bin/openclaw gateway
